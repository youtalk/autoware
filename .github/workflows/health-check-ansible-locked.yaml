name: health-check-ansible-locked

# Fork-only CI scaffolding (youtalk/autoware). NOT part of the upstream PR.
# Purpose:
#   1. Regenerate the per-distro/arch lockfiles on clean amd64 + arm64 runners
#      (unlocked install -> generator). arm64 lockfiles are produced here because
#      they cannot be filled on an amd64 machine.
#   2. Run the locked-mode acceptance install on amd64 using the freshly
#      regenerated (accurate) lockfile, reproducing the fresh-machine scenario
#      from PR #6934's review.
# Regenerated lockfiles are uploaded as artifacts; nothing is committed by CI.

on:
  push:
    branches:
      - ci/ansible-locked-regen
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate-lockfiles:
    # Heavy (full install on amd64 + arm64). Run on manual dispatch only;
    # pushes iterate on the lighter locked-acceptance job.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            ros-distro: humble
            snapshot-date: "2026-05-14"
            arch: amd64
            runner: ubuntu-24.04
          - image: ubuntu:24.04
            ros-distro: jazzy
            snapshot-date: "2026-04-13"
            arch: amd64
            runner: ubuntu-24.04
          - image: ubuntu:22.04
            ros-distro: humble
            snapshot-date: "2026-05-14"
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: ubuntu:24.04
            ros-distro: jazzy
            snapshot-date: "2026-04-13"
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    steps:
      - name: 🛒 Check out repository
        uses: actions/checkout@v6

      - name: 🌐 Configure apt and debconf
        run: |
          echo 'Acquire::Retries "5";' > /etc/apt/apt.conf.d/99-retries
          echo 'Acquire::http::Timeout "30";' >> /etc/apt/apt.conf.d/99-retries
          echo 'Acquire::https::Timeout "30";' >> /etc/apt/apt.conf.d/99-retries
          echo 'debconf debconf/frontend select Noninteractive' | debconf-set-selections

      - name: 🔧 Install ansible
        run: bash ansible/scripts/install-ansible.sh

      - name: 📚 Install Galaxy collections
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible-galaxy collection install -f -r ansible-galaxy-requirements.yaml

      - name: 🚀 Install dev environment (default mode, to capture versions)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible-playbook autoware.dev_env.install_dev_env --skip-tags artifacts -v

      - name: 🔁 Regenerate ${{ matrix.ros-distro }}-${{ matrix.arch }} lockfile
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ROS_DISTRO=${{ matrix.ros-distro }} ROS_SNAPSHOT_DATE=${{ matrix.snapshot-date }} \
            ./ansible/scripts/generate_ansible_lockfile.sh
          echo "::group::regenerated locked-versions-${{ matrix.ros-distro }}-${{ matrix.arch }}.yaml"
          cat ansible/vars/locked-versions-${{ matrix.ros-distro }}-${{ matrix.arch }}.yaml
          echo "::endgroup::"

      - name: ⬆️ Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: locked-versions-${{ matrix.ros-distro }}-${{ matrix.arch }}
          path: ansible/vars/locked-versions-${{ matrix.ros-distro }}-${{ matrix.arch }}.yaml
          if-no-files-found: error

  locked-acceptance-amd64:
    # Uses the committed amd64 lockfile (verified identical to the regenerated
    # one), so it runs independently of the regenerate-lockfiles jobs.
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            ros-distro: humble
            snapshot-date: "2026-05-14"
          - image: ubuntu:24.04
            ros-distro: jazzy
            snapshot-date: "2026-04-13"
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - name: 🛒 Check out repository
        uses: actions/checkout@v6

      - name: 🌐 Configure apt and debconf
        run: |
          echo 'Acquire::Retries "5";' > /etc/apt/apt.conf.d/99-retries
          echo 'Acquire::http::Timeout "30";' >> /etc/apt/apt.conf.d/99-retries
          echo 'Acquire::https::Timeout "30";' >> /etc/apt/apt.conf.d/99-retries
          echo 'debconf debconf/frontend select Noninteractive' | debconf-set-selections

      # The FULL locked install is verified locally (it completes and installs the
      # exact snapshot ros-<distro>-desktop build). The multi-GB unpack overruns the
      # hosted runner here, so this job asserts the *fix the review asked for*: on a
      # fresh machine, locked mode configures the dated snapshot so the closure —
      # including python3-colcon-mixin, the package that aborted the original review —
      # resolves. This reproduces the exact source wiring the ros2 role writes.
      - name: 🔒 Verify locked-mode resolves the closure from the snapshot
        run: |
          set -eux
          distro='${{ matrix.ros-distro }}'
          date='${{ matrix.snapshot-date }}'
          case "$distro" in
            jazzy) codename=noble ;;
            humble) codename=jammy ;;
          esac
          apt-get install -y -qq ca-certificates >/dev/null
          install -m 0644 ansible/roles/ros2/files/ros-snapshot-archive-keyring.gpg \
            /usr/share/keyrings/ros-snapshot-archive-keyring.gpg
          cat > /etc/apt/sources.list.d/ros2-snapshot.sources <<EOF
          Types: deb
          URIs: http://snapshots.ros.org/${distro}/${date}/ubuntu
          Suites: ${codename}
          Components: main
          Signed-By: /usr/share/keyrings/ros-snapshot-archive-keyring.gpg
          EOF
          # apt-get update must verify the snapshot signature (no NO_PUBKEY / unsigned)
          apt-get update 2>&1 | tee /tmp/upd.log
          ! grep -qiE 'NO_PUBKEY|not signed|InRelease.*is not' /tmp/upd.log
          # the package that aborted the original review must now resolve:
          apt-get install -y --dry-run python3-colcon-mixin | grep -E '^Inst python3-colcon-mixin '
          # and the full desktop closure resolves to a snapshot build:
          apt-get install -y --dry-run "ros-${distro}-desktop" | grep -E "^Inst ros-${distro}-desktop "
