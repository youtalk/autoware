# No-provider image set: a consumer requires /localization/kinematic_state, but no image in the
# set provides it. Because the deploy-time image set is complete, deploy_check.sh must REJECT this
# with NO_PROVIDER (exit 1) — unlike the runtime observe mode, which skips a not-yet-started
# provider.
services:
  provider:
    image: oss-if-gate-self-test-provider
  consumer:
    image: oss-if-gate-self-test-consumer-no-provider
